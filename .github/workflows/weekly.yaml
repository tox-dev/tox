name: weekly checks
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags-ignore: ["**"]
  pull_request:
    paths:
      - .github/workflows/weekly.yaml
  schedule:
    - cron: "0 8 * * 1"
permissions:
  contents: read
env:
  FORCE_COLOR: 1
concurrency:
  group: weekly-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: test ${{ matrix.py }} on ${{ matrix.os.name }}
    runs-on: ${{ matrix.os.image }}
    strategy:
      fail-fast: false
      matrix:
        py:
          - "3.15"
        os:
          - {image: ubuntu-24.04, name: ubuntu}
          - {image: windows-2025-vs2026, name: windows}
          - {image: macos-15, name: macos}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          cache-dependency-glob: "pyproject.toml"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Add .local/bin to Windows PATH
        if: runner.os == 'Windows'
        shell: bash
        run: echo "$USERPROFILE/.local/bin" >> $GITHUB_PATH
      - name: Install tox@self
        run: uv tool install --python-preference only-managed --python ${{ matrix.py }} tox@.
      - name: Setup test suite
        run: tox run -vv --notest --skip-missing-interpreters false -e ${{ matrix.py }}
      - name: Run test suite
        run: tox run --skip-pkg-install -e ${{ matrix.py }}
        env:
          PYTEST_ADDOPTS: "-vv --durations=20"
          DIFF_AGAINST: HEAD
          PYTEST_XDIST_AUTO_NUM_WORKERS: 0
